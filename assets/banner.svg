<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Portal Reborn — turn a bricked Meta Portal into a private AI assistant">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070a10"/>
      <stop offset="1" stop-color="#0d1422"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5ef0d6"/>
      <stop offset="55%" stop-color="#3a86ff"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#eafcff"/>
      <stop offset="1" stop-color="#9fd8ff"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="26" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="340" rx="20" fill="url(#bg)"/>

  <!-- glowing orb -->
  <g filter="url(#glow)" transform="translate(210,170)">
    <circle r="96" fill="url(#orb)" opacity="0.95"/>
    <circle r="120" fill="none" stroke="#5ef0d6" stroke-opacity="0.25" stroke-width="2"/>
    <circle r="150" fill="none" stroke="#7c4dff" stroke-opacity="0.18" stroke-width="2"/>
  </g>

  <!-- text -->
  <text x="430" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="74" font-weight="800" fill="url(#title)">Portal&#160;Reborn</text>
  <text x="434" y="200" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#9bb3c9">Turn a Meta-bricked Portal into a private voice&#160;+&#160;vision AI assistant.</text>
  <text x="434" y="246" font-family="SFMono-Regular, Consolas, monospace" font-size="20" fill="#5ef0d6">$ git clone &#8230;/unbrick-portal&#160;&#160;→&#160;&#160;🎙️ tap. talk. it answers.</text>
</svg>
